name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --prerelease=${{ contains(github.ref_name, '-') }}

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: xescoding_helper
            artifact: xescoding-helper-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: xescoding_helper.exe
            artifact: xescoding-helper-windows-x86_64.exe
          - os: macos-13
            target: x86_64-apple-darwin
            binary: xescoding_helper
            artifact: xescoding-helper-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            binary: xescoding_helper
            artifact: xescoding-helper-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p build
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "build/${{ matrix.artifact }}"
          ls -la build

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "build/${{ matrix.artifact }}" --clobber

  attach-sources:
    name: Attach source archives
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source archives
        run: |
          git archive --format=tar.gz --prefix="xescoding-helper-${GITHUB_REF_NAME}/" \
            -o "xescoding-helper-${GITHUB_REF_NAME}-source.tar.gz" HEAD
          git archive --format=zip --prefix="xescoding-helper-${GITHUB_REF_NAME}/" \
            -o "xescoding-helper-${GITHUB_REF_NAME}-source.zip" HEAD
          ls -la *.tar.gz *.zip

      - name: Upload source archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "xescoding-helper-${GITHUB_REF_NAME}-source.tar.gz" \
            "xescoding-helper-${GITHUB_REF_NAME}-source.zip" --clobber

  publish:
    name: Publish release
    needs: attach-sources
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
